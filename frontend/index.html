<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow - 업무 관리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen transition-colors duration-300">

  <div class="max-w-2xl mx-auto py-10 px-4">

    <!-- 헤더 -->
    <div class="flex items-center justify-between mb-8">
      <h1 class="text-3xl font-bold text-blue-600 dark:text-blue-400">TaskFlow</h1>
      <button
        id="themeToggle"
        onclick="toggleDarkMode()"
        class="w-10 h-10 flex items-center justify-center rounded-full bg-white dark:bg-gray-700 shadow text-xl hover:scale-110 transition-transform"
        title="다크/라이트 모드 전환"
      >
        <span id="themeIcon">🌙</span>
      </button>
    </div>

    <!-- 업무 추가 폼 -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-5 mb-8 space-y-3">
      <input
        id="taskTitle"
        type="text"
        placeholder="업무 제목 *"
        class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-400"
      />
      <textarea
        id="taskDesc"
        placeholder="업무 내용 (선택)"
        rows="2"
        class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"
      ></textarea>

      <!-- 시작일/시간 -->
      <div>
        <label class="text-xs text-gray-500 dark:text-gray-400 mb-1 block">시작일시</label>
        <div class="flex gap-2">
          <input id="taskStartDate" type="date"
            class="flex-1 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-400" />
          <input id="taskStartTime" type="time"
            class="w-32 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-400" />
        </div>
      </div>

      <!-- 마감일/시간 -->
      <div>
        <label class="text-xs text-gray-500 dark:text-gray-400 mb-1 block">마감일시</label>
        <div class="flex gap-2">
          <input id="taskDueDate" type="date"
            class="flex-1 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-400" />
          <input id="taskDueTime" type="time"
            class="w-32 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-400" />
        </div>
      </div>

      <button
        onclick="addTask()"
        class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-lg font-semibold transition"
      >
        업무 추가
      </button>
    </div>

    <!-- 업무 목록 -->
    <div id="taskList" class="space-y-3"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
